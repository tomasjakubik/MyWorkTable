<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Table surface -->
  <rect x="72" y="160" width="368" height="220" rx="16" fill="#1e293b" stroke="url(#accent)" stroke-width="6"/>
  <!-- Horizontal divider -->
  <line x1="72" y1="230" x2="440" y2="230" stroke="#334155" stroke-width="3"/>
  <!-- Vertical divider -->
  <line x1="256" y1="230" x2="256" y2="380" stroke="#334155" stroke-width="3"/>
  <!-- Header text lines -->
  <rect x="100" y="180" width="140" height="12" rx="6" fill="#60a5fa" opacity="0.9"/>
  <rect x="260" y="180" width="80" height="12" rx="6" fill="#818cf8" opacity="0.7"/>
  <!-- Left column items (todos) -->
  <!-- Checkbox 1 - checked -->
  <rect x="92" y="248" width="16" height="16" rx="4" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <polyline points="95,257 99,261 105,251" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="118" y="251" width="110" height="8" rx="4" fill="#94a3b8" opacity="0.5"/>
  <!-- Checkbox 2 - unchecked -->
  <rect x="92" y="282" width="16" height="16" rx="4" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
  <rect x="118" y="285" width="90" height="8" rx="4" fill="#94a3b8" opacity="0.7"/>
  <!-- Checkbox 3 - unchecked -->
  <rect x="92" y="316" width="16" height="16" rx="4" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
  <rect x="118" y="319" width="120" height="8" rx="4" fill="#94a3b8" opacity="0.7"/>
  <!-- Right column items (cards/sessions) -->
  <rect x="276" y="248" width="140" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="288" y="258" width="60" height="6" rx="3" fill="#60a5fa" opacity="0.6"/>
  <rect x="288" y="270" width="100" height="5" rx="3" fill="#94a3b8" opacity="0.4"/>
  <rect x="276" y="298" width="140" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="288" y="308" width="50" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
  <rect x="288" y="320" width="80" height="5" rx="3" fill="#94a3b8" opacity="0.4"/>
  <rect x="276" y="348" width="140" height="24" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2" opacity="0.5"/>
  <!-- Top accent bar -->
  <rect x="72" y="148" width="368" height="18" rx="9" fill="url(#accent)" opacity="0.15"/>
  <!-- "M" letter mark top-left -->
  <text x="88" y="130" font-family="system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#accent)">M</text>
</svg>
